name: Deploy to VPS + GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            web/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/www/wwwroot/ryw-yun-project/sbti-wiki/
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=accept-new \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chown -R www:www /www/wwwroot/ryw-yun-project/sbti-wiki"

  deploy-ghpages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create 404.html for SPA routing
        run: cp web/index.html web/404.html

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
